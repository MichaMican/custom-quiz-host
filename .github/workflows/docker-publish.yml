name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

jobs:
  version:
    uses: MichaMican/reusable-actions/.github/workflows/semver-version.yml@main
    permissions:
      contents: write
      actions: read

  build-and-push:
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: CustomQuizHost.Server/Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

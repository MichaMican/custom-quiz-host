name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - ".vscode/**"
      - "*.md"
      - "website/**"
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - ".github/**"
      - ".vscode/**"
      - "*.md"
      - "website/**"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  version:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: MichaMican/reusable-actions/.github/workflows/semver-version.yml@main
    with:
      is_prerelease: ${{ github.event_name != 'workflow_dispatch' || github.ref != 'refs/heads/main' }}
      suppress_release: ${{ github.ref != 'refs/heads/main' }}
      prerelease_name: ${{ github.ref != 'refs/heads/main' && 'internal' || (github.event_name == 'push' && 'preview') || '' }}
    permissions:
      contents: write
      actions: read

  build-and-push:
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Determine Docker tags
        id: docker-tags
        run: |
          TAGS="${IMAGE_NAME}:${{ needs.version.outputs.version }}"

          if [ "${{ github.event_name }}" == "pull_request" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            # Internal release (PR or non-main branch): version + internal
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:internal"
          elif [ "${{ github.event_name }}" == "push" ]; then
            # Preview release: version + preview
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:preview"
          else
            # Stable release: version + latest + preview + internal
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:latest"
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:preview"
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:internal"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: CustomQuizHost.Server/Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          tags: ${{ steps.docker-tags.outputs.tags }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.version.outputs.version }}
          TAGS: ${{ steps.docker-tags.outputs.tags }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Build the tag list (extract tag name after the last colon)
          TAG_LIST=$(echo "$TAGS" | rev | cut -d: -f1 | rev | sed 's/^/- `/' | sed 's/$/`/')

          COMMENT_BODY="<!-- docker-publish-comment -->
          ### 🚀 Docker Image Published

          **Version:** \`${VERSION}\`

          **Channels (image tags):**
          ${TAG_LIST}"

          # Update existing comment if present, otherwise create a new one
          COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- docker-publish-comment -->")) | .id' | tail -1 || true)

          if [ -n "$COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" \
              -X PATCH -f body="$COMMENT_BODY"
          else
            gh pr comment "${PR_NUMBER}" --body "$COMMENT_BODY"
          fi

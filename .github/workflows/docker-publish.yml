name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - ".vscode/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: false

jobs:
  version:
    uses: MichaMican/reusable-actions/.github/workflows/semver-version.yml@main
    with:
      is_prerelease: ${{ github.event_name != 'workflow_dispatch' || github.ref != 'refs/heads/main' }}
      suppress_release: ${{ github.ref != 'refs/heads/main' }}
      prerelease_name: ${{ github.ref != 'refs/heads/main' && 'internal' || (github.event_name == 'push' && 'prerelease') || '' }}
    permissions:
      contents: write
      actions: read

  build-and-push:
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: CustomQuizHost.Server/Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

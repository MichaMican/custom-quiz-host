name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"
      - ".vscode/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: false

jobs:
  version:
    uses: MichaMican/reusable-actions/.github/workflows/semver-version.yml@main
    with:
      is_prerelease: ${{ github.event_name != 'workflow_dispatch' || github.ref != 'refs/heads/main' }}
      suppress_release: ${{ github.ref != 'refs/heads/main' }}
      prerelease_name: ${{ github.ref != 'refs/heads/main' && 'internal' || (github.event_name == 'push' && 'prerelease') || '' }}
    permissions:
      contents: write
      actions: read

  build-and-push:
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Determine Docker tags
        id: docker-tags
        run: |
          TAGS="${IMAGE_NAME}:${{ needs.version.outputs.version }}"

          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            # Internal release: version + internal
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:internal"
          elif [ "${{ github.event_name }}" == "push" ]; then
            # Preview release: version + preview
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:preview"
          else
            # Stable release: version + latest + preview + internal
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:latest"
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:preview"
            TAGS="$TAGS"$'\n'"${IMAGE_NAME}:internal"
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: CustomQuizHost.Server/Dockerfile
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          tags: ${{ steps.docker-tags.outputs.tags }}

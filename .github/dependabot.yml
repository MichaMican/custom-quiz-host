version: 2
updates:
  # GitHub Actions - Weekly updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  # NuGet packages - Quarterly updates (every 3 months on the 1st)
  - package-ecosystem: "nuget"
    directory: "/CustomJeopardyHost.Server"
    schedule:
      interval: "cron"
      cron: "0 0 1 */3 *"
      timezone: "UTC"
    groups:
      nuget-packages:
        patterns:
          - "*"

  # npm packages - Quarterly updates (every 3 months on the 1st)
  - package-ecosystem: "npm"
    directory: "/customjeopardyhost.client"
    schedule:
      interval: "cron"
      cron: "0 0 1 */3 *"
      timezone: "UTC"
    groups:
      npm-packages:
        patterns:
          - "*"

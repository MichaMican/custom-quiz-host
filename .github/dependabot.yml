version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "monthly"
    groups:
      action-dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "nuget"
    directory: "/CustomQuizHost.Server"
    cooldown:
      default-days: 7
    schedule:
      interval: "quarterly"
    groups:
      nuget-dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
          
  - package-ecosystem: "npm"
    directory: "/customquizhost.client"
    cooldown:
      default-days: 7
    schedule:
      interval: "quarterly"
    groups:
      npm-dependencies:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
    ignore:
      # eslint v10 not compatible with eslint-plugin-react-hooks as of April 2026.
      # Remove this once upstream plugins release v10-compatible versions.
      # Tracking: https://github.com/jsx-eslint/eslint-plugin-react/issues/3977
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      - dependency-name: "@eslint/js"
        versions: [">=10.0.0"]